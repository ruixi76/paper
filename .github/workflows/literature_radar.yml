# 文献雷达每日推送 - GitHub Actions 工作流
# 每天北京时间8:00（UTC 0:00）自动触发，也可手动运行

name: 文献雷达每日推送

on:
  # 定时触发：每天 UTC 0:00（北京时间 8:00）
  schedule:
    - cron: '0 0 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  trigger-coze:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 推送 - 张蕊喜（域自适应）
        run: |
          curl -s --max-time 30 --location --request POST 'https://9rhxdv55k2.coze.site/run' \
              --header 'Authorization: Bearer ${{ secrets.API_Token }}' \
              --header 'Content-Type: application/json' \
              --data '{
                "to_email":"1372392238@qq.com",
                "user_profile":{
                  "research_directions":["Domain Adaptation","Computer Vision"],
                  "keywords":["unsupervised domain adaptation","feature alignment","adversarial training"],
                  "preferred_authors":[""]
                }
              }'&
          PID1=$!

          curl --location --request POST 'https://9rhxdv55k2.coze.site/run' \
            --header 'Authorization: Bearer ${{ secrets.API_Token }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "to_email":"1372392238@qq.com",
              "user_profile":{
                  "research_directions":["Terahertz","Electromagnetic Wave"],
                  "keywords":["terahertz imaging","metasurface","spectroscopy"],
                  "preferred_authors":[""]
              }
            }'&
          PID2=$!

          curl --location --request POST 'https://9rhxdv55k2.coze.site/run' \
            --header 'Authorization: Bearer ${{ secrets.API_Token }}' \
            --header 'Content-Type: application/json' \
            --data '{
              "to_email":"1372392238@qq.com",
              "user_profile":{
                  "research_directions":["Medical Image","Deep Learning"],
                  "keywords":["MRI segmentation","few-shot learning","attention mechanism"],
                  "preferred_authors":[""]
              }
            }'&
          PID3=$!
          # 等待全部完成
          wait $PID1 $PID2 $PID3
